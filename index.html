<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>杰霖避險 LRS — 每日操作判斷</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 4px; }
    .sub { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
    label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; }
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
      color: #111;
      background: #fafafa;
      margin-bottom: 1rem;
      appearance: none;
      cursor: pointer;
    }
    select:focus { outline: none; border-color: #999; }
    button {
      width: 100%;
      padding: 12px;
      background: #111;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #333; }
    button:disabled { background: #bbb; cursor: not-allowed; }
    .result {
      margin-top: 1.5rem;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 1.25rem;
      display: none;
    }
    .conclusion { font-size: 20px; font-weight: 600; margin-bottom: 12px; line-height: 1.3; }
    .conclusion.action { color: #c0392b; }
    .conclusion.hold { color: #111; }
    .divider { border: none; border-top: 1px solid #eee; margin: 12px 0; }
    .detail { font-size: 14px; color: #555; line-height: 1.7; white-space: pre-wrap; }
    .loading { font-size: 14px; color: #888; }
  </style>
</head>
<body>
  <div class="card">
    <h1>杰霖避險 LRS</h1>
    <p class="sub">每日操作判斷工具 — 自動查詢 NDX 資料</p>

    <label>目前持倉狀態</label>
    <select id="position-state">
      <option value="holding">持有 TQQQ 中</option>
      <option value="hedge-lrs">避險中（LRS 出場）</option>
      <option value="hedge-dev">避險中（乖離出清）</option>
    </select>

    <label>乖離安全閥本週期</label>
    <select id="dev-used">
      <option value="no">本週期未使用過</option>
      <option value="yes">本週期已用過</option>
    </select>

    <button id="btn" onclick="runCheck()">查詢今日操作建議</button>

    <div class="result" id="result">
      <div id="result-inner"></div>
    </div>
  </div>

  <script>
    async function runCheck() {
      const state = document.getElementById('position-state').value;
      const devUsed = document.getElementById('dev-used').value;
      const btn = document.getElementById('btn');
      const result = document.getElementById('result');
      const inner = document.getElementById('result-inner');

      btn.disabled = true;
      btn.textContent = '查詢中...';
      result.style.display = 'block';
      inner.innerHTML = '<p class="loading">正在查詢 NDX 即時資料並分析...</p>';

      const stateLabel = {
        'holding': '持有 TQQQ 中',
        'hedge-lrs': '避險中（LRS 出場）',
        'hedge-dev': '避險中（乖離出清）'
      }[state];

      const todayStr = new Date().toLocaleDateString('zh-TW', {
        year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
      });

      const prompt = `你是「杰霖避險 LRS」策略的每日操作助理。今天是 ${todayStr}。

請用 web search 查詢：
1. NDX（Nasdaq-100 指數）的最新收盤價
2. NDX 的 200 日簡單移動平均線（200-day SMA）最新數值

計算乖離率 = (NDX收盤 - 200日SMA) / 200日SMA

目前持倉狀態：${stateLabel}
乖離安全閥本週期是否已用過：${devUsed === 'yes' ? '已用過' : '未用過'}

決策規則：
【持有 TQQQ 中】
  → NDX 跌破 200MA：明天開盤出清 TQQQ → 避險籃
  → NDX 乖離 ≥ +30% 且本週期未用過：明天開盤出清 TQQQ → 待回場資金
  → 其他：今天不動，續抱

【避險中（LRS 出場）】
  → NDX 站上 200MA：明天開盤全買回 TQQQ
  → 其他：今天不動，續避險

【避險中（乖離出清）】
  → NDX 跌破 200MA：改為 LRS 出場狀態，待回場資金併入避險籃
  → NDX 乖離 < +20% 且站上 MA：明天開盤用待回場資金買回 TQQQ
  → 其他：今天不動，續避險

請用繁體中文回覆，嚴格只輸出以下格式：

操作結論：[結論]

數據：
- NDX 收盤：[數值]（[日期]）
- 200日 SMA：[數值]
- 乖離率：[百分比]
- NDX 站上 200MA：[是 / 否]

判斷說明：[1-2句話]

資料來源：[來源]`;

      try {
        const resp = await fetch('/api/check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });

        const text = await resp.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch(e) {
          throw new Error('伺服器回傳非 JSON：' + text.slice(0, 100));
        }

        if (!resp.ok) throw new Error(data.error || '伺服器錯誤');

        const lines = data.result.split('\n').filter(l => l.trim());
        const conclusionLine = lines.find(l => l.startsWith('操作結論：'));
        const conclusion = conclusionLine ? conclusionLine.replace('操作結論：', '').trim() : '請查看下方說明';
        const rest = lines.filter(l => !l.startsWith('操作結論：')).join('\n');
        const isAction = conclusion.includes('明天');

        inner.innerHTML = `
          <div class="conclusion ${isAction ? 'action' : 'hold'}">${conclusion}</div>
          <hr class="divider">
          <div class="detail">${rest.replace(/\n/g, '<br>')}</div>
        `;
      } catch (e) {
        inner.innerHTML = `<p class="detail" style="color:#c0392b">查詢失敗：${e.message}</p>`;
      }

      btn.disabled = false;
      btn.textContent = '查詢今日操作建議';
    }
  </script>
</body>
</html>
