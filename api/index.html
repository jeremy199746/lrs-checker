<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>杰霖避險 LRS — 每日操作判斷</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 4px; }
    .sub { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
    label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; }
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
      color: #111;
      background: #fafafa;
      margin-bottom: 1rem;
      appearance: none;
      cursor: pointer;
    }
    select:focus { outline: none; border-color: #999; }
    button {
      width: 100%;
      padding: 12px;
      background: #111;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #333; }
    button:disabled { background: #bbb; cursor: not-allowed; }
    .result {
      margin-top: 1.5rem;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 1.25rem;
      display: none;
    }
    .conclusion { font-size: 20px; font-weight: 600; margin-bottom: 12px; line-height: 1.3; }
    .conclusion.action { color: #c0392b; }
    .conclusion.hold { color: #111; }
    .divider { border: none; border-top: 1px solid #eee; margin: 12px 0; }
    .detail { font-size: 14px; color: #555; line-height: 1.7; white-space: pre-wrap; }
    .loading { font-size: 14px; color: #888; }
  </style>
</head>

    <label>目前持倉狀態</label>
    <select id="position-state">
      <option value="holding">持有 TQQQ 中</option>
      <option value="hedge-lrs">避險中（LRS 出場）</option>
      <option value="hedge-dev">避險中（乖離出清）</option>
    </select>

    <label>乖離安全閥本週期</label>
    <select id="dev-used">
      <option value="no">本週期未使用過</option>
      <option value="yes">本週期已用過</option>
    </select>

    <button id="btn" onclick="runCheck()">查詢今日操作建議</button>

    <div class="result" id="result">
      <div id="result-inner"></div>
    </div>
  </div>
